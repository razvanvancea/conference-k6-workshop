networks:
  k6:
  grafana:

services:
  influxdb:
    image: influxdb:1.8.10
    #    entrypoint: /bin/sh
    #    user: root
    networks:
      - k6
      - grafana
    ports:
      - '8086:8086'
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
    volumes:
      - ./docker/grafana/influxdb_data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:10.4.2
    #    entrypoint: /bin/sh
    #    user: root
    networks:
      - grafana
    ports:
      - '3000:3000'
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./docker/grafana/grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
      - ./docker/grafana/grafana-dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml
      - ./docker/grafana/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml

  chronograf:
    image: chronograf:1.8
    ports:
      - '8888:8888'
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=root
      - INFLUXDB_PASSWORD=root
      - INFLUXDB_SKIP_VERIFY=true
    depends_on:
      - influxdb
    networks:
      - k6

  k6:
    image: grafana/k6
    #    entrypoint: /bin/sh
    #    user: root
    networks:
      - k6
    ports:
      - '6565:6565'
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
    volumes:
      - ./scripts:/scripts

  books-crud-api-app:
    image: rvancea/books-crud-api-app
    platform: linux/amd64
    networks:
      - k6
    ports:
      - '3010:3001'
